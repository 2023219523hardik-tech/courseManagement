version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ocms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ocms
      MYSQL_USER: ocms_user
      MYSQL_PASSWORD: ocms_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ocms-network

  # OCMS Application
  ocms-app:
    build: .
    container_name: ocms-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ocms
      SPRING_DATASOURCE_USERNAME: ocms_user
      SPRING_DATASOURCE_PASSWORD: ocms_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - mysql
    networks:
      - ocms-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  ocms-network:
    driver: bridge